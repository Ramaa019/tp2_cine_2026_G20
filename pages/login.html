<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Login</title>
    <meta name="description" content="Cine Aurora - Login" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
    <header class="main-header">
        <div class="header-brand">
            <h1>Cine Aurora</h1>
            <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" />
        </div>
        <nav class="header-nav">
            <a href="../index.html">Inicio</a>
            <a href="./estrenos.html">Próximos estrenos</a>
            <a href="../index.html">Volver</a>
        </nav>
    </header>

    <main class="login-container">
        <form action="perfil.html" class="login-form">
            <h2 class="form-title">Acceso Clientes</h2>
            
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input" required />
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-input" required />
            </div>

            <button type="submit" class="btn-primary">Ingresar</button>
            
            <p class="form-text">
                ¿No eres miembro? <a href="registro.html" class="form-link">Regístrate</a>
            </p>
        </form>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
    </footer>
</body>
</html>
