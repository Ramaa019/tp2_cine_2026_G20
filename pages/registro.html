<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Registro</title>
    <meta name="description" content="Cine Aurora - Registro" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="header">
      <div class="header-logo-container">
        <h1 class="header-logo-titulo">Cine Aurora</h1>
        <img class="header-logo-img" src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" />
      </div>
      <nav class="header-nav">
        <a class="header-nav-link" href="../index.html">Inicio</a>
        <a class="header-nav-link" href="./estrenos.html">Próximos estrenos</a>
        <a class="header-nav-link" href="../index.html">Volver</a>
      </nav>
    </header>

    <main class="main-container">

      <section class="registro">

        <form class="formulario" action="login.html">
          
          <h2 class="formulario-titulo">Crear nueva cuenta</h2>

          <div class="formulario-campo">
            <label class="formulario-label" for="nombre">Nombre Completo</label>
            <input class="formulario-input" type="text" id="nombre" required />
          </div>

          <div class="formulario-campo">
            <label class="formulario-label" for="email">Email</label>
            <input class="formulario-input" type="email" id="email" required />
          </div>

          <div class="formulario-campo">
            <label class="formulario-label" for="fecha-nacimiento">Fecha de nacimiento</label>
            <input class="formulario-input" type="date" id="fecha-nacimiento" required />
          </div>

          <div class="formulario-campo">
            <label class="formulario-label" for="password">Contraseña</label>
            <input class="formulario-input" type="password" id="password" required />
          </div>
    
          <div class="formulario-campo">
            <label class="formulario-label" for="confirm-password">Confirmar contraseña</label>
            <input class="formulario-input" type="password" id="confirm-password" required />
          </div>
    
          <div class="formulario-preguntas">
            
            <div>
              <h3 class="formulario-preguntas-titulo">Datos para ayudar al cine</h3>
              <p class="formulario-preguntas-texto">Estos datos nos ayudan a mejorar tu experiencia.</p>
            </div>

            <div>
              <div class="formulario-campo">
                <label class="formulario-label">Elegí tu color favorito para las butacas</label>
                <input class="formulario-input" type="color" />
              </div>
    
              <div class="formulario-campo">
                <label class="formulario-label"
                  >¿Cuántas entradas comprás en general? Min: 0 | Max: 10</label
                >
                <input class="formulario-input" type="range" min="0" max="10" />
              </div>
    
              <div class="formulario-campo">
                <label class="formulario-label">Seleccioná tu género favorito</label>
                <select class="formulario-input">
                  <option value="" disabled selected>Seleccioná una opción...</option>
                  <option>Acción</option>
                  <option>Drama</option>
                  <option>Ciencia ficción</option>
                  <option>Terror</option>
                  <option>Comedia</option>
                  <option>Romance</option>
                </select>
              </div>
    
              <div class="formulario-campo">
                <label class="formulario-label">Elegí tu snack favorito</label>
                
                <div class="opciones-snack"> 
                  <label class="formulario-label"><input type="radio" name="snack" value="dulce"/> Pochoclo dulce</label>
                  <label class="formulario-label"><input type="radio" name="snack" value="salado"/> Pochoclo salado</label>
                  <label class="formulario-label"><input type="radio" name="snack" value="chocolate"/> Chocolate</label>
                  <label class="formulario-label"><input type="radio" name="snack" value="frutos"/> Frutos secos</label>
                </div>
              </div>
            </div>
          </div>
    
          <button class="card-btn" type="submit">Regístrate</button>
      
        </form>
      </section>

      
    </main>
    
    <footer class="footer">
      <p class="footer-text">&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
    </footer>
  
  </body>
</html>
